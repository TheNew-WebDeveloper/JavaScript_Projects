<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Successful</title>
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;

  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: #333;
}

.success-container {
  background: white;
  padding: 40px 30px;
  border-radius: 16px;
  text-align: center;

  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  animation: fadeIn 0.5s ease;
}

/* checkmark circle */
.checkmark {
  width: 80px;
  height: 80px;
  margin: 0 auto 20px;

  background: #22c55e;
  color: white;
  font-size: 40px;
  font-weight: bold;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 50%;
  animation: pop 0.4s ease;
}

/* text */
.success-container h1 {
  margin-bottom: 10px;
}

.success-container p {
  margin: 5px 0;
  color: #555;
}

/* button */
.success-container button {
  margin-top: 20px;
  padding: 10px 18px;

  border: none;
  border-radius: 8px;

  background: #3b82f6;
  color: white;

  cursor: pointer;
  transition: 0.2s;
}

.success-container button:hover {
  background: #2563eb;
}

/* animations */
@keyframes pop {
  from {
    transform: scale(0.5);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
  </style>
</head>
<body>

  <div class="success-container">
    
    <div class="checkmark">✔</div>

    <h1>Order Placed Successfully!</h1>
    <p>Thank you for your purchase 🎉</p>
    <p>Your order will be delivered soon.</p>

  </div>

  <script>
  setTimeout(() => {
    window.location.href = "index.html";
  }, 5000);
</script>

</body>
</html>
