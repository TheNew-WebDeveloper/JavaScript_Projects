<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>💰 Expense Tracker</h1>

        <!-- Balance Section -->
        <div class="balance-box">
            <h3>Your Balance</h3>
            <h2 id="balance">₹0.00</h2>
        </div>

        <!-- Income & Expense -->
        <div class="summary">
            <div class="income">
                <h4>Income</h4>
                <p id="income">₹0.00</p>
            </div>
            <div class="expense">
                <h4>Expense</h4>
                <p id="expense">₹0.00</p>
            </div>
        </div>

        <!-- Add Transaction -->
        <div class="form">
            <h3>Add Transaction</h3>
            <form id="transaction-form">
                <div class="validate">
                    <h5 style="color: red;">Please Enter Valid Description</h5>
                </div>
                <input type="text" id="text" placeholder="Enter description..." required>
                
                <div class="validate">
                    <h5 style="color: red;">Please Enter Valid Amount</h5>
                </div>
                <input type="number" id="amount" placeholder="Enter amount (+ income, - expense)" required>
                <button type="submit" id="btn">Add</button>
            </form>
        </div>

        <!-- Transaction History -->
        <div class="history">
            <h3>History</h3>
            <ul id="list">
                <!-- JS will add items here -->
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
