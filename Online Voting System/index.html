<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Online Voting System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🗳️ Online Voting System</h1>
  </header>

  <main>

    <!-- Login Section -->
    <section id="login-section" class="card">
      <h2>Voter Login</h2>
      <input type="text" id="voter-id" placeholder="Enter Voter ID">
      <div id="error" class="invalidId">
        <h4>Enter valid Voter Id</h4>
      </div>
      <button id="login-btn">Login</button>
    </section>

    <!-- Voting Section -->
    <section id="voting-section" class="card hidden">
      <h2>Select Your Candidate</h2>

      <div id="candidates">
        <!-- Example Candidate -->
        <div class="candidate">
          <h3 class="value">Candidate A</h3>
          <button class="vote-btn">Vote a</button>
        </div>

        <div class="candidate">
          <h3 class="value">Candidate B</h3>
          <button class="vote-btn">Vote b</button>
        </div>

        <div class="candidate">
          <h3 class="value">Candidate C</h3>
          <button class="vote-btn">Vote c</button>
        </div>
      </div>

      <button id="logout-btn">Logout</button>
    </section>

    <!-- Result Section -->
    <section id="result-section" class="card">
      <h2>Live Results</h2>
      <div id="results" class="result-card">
        <!-- Filled dynamically -->
         <div class="result"><h3>Candidate A :</h3><span class="canres">0</span> votes</div>
         <div class="result"><h3>Candidate B :</h3><span class="canres">0</span> votes</div>
         <div class="result"><h3>Candidate C :</h3><span class="canres">0</span> votes</div>
      </div>
    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
